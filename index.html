<!DOCTYPE html>
<html ng-app="campus-360">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="node_modules/angular/angular.min.js"></script>
    <script src="js/app.js"></script>
    <title>Dashboard</title>
</head>

<body ng-controller="dashboardcontroller">

    <input type="text" ng-model="collegename"><br><br>
    <input type="text" ng-model="totalStudents"><br><br>
    <button ng-click="totalStudents = totalStudents + 1">Add Students</button>
    <br><br><input type="text" ng-model="totalFaculty"><br><br>
    <button ng-click="totalFaculty = totalFaculty + 1">Add Faculty</button><br><br>

    <h1>{{collegename}}</h1>
    <p>Total Students : {{totalStudents}}</p>
    <p>Total Faculty : {{totalFaculty}}</p>
    <h2>Student list</h2>
    <ul>
        <li ng-repeat="student in students">
            {{student}}
        </li>
    </ul>

</body>

</html>
